<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>{{TITLE}}</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root {
    --bg: #0d0d0d;
    --fg: #fff;
    --body: rgba(255,255,255,0.9);
    --muted: rgba(255,255,255,0.46);
    --blue: #0b78f8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1350px; overflow: hidden; background: var(--bg);
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
  }
  .card { position: relative; width: 1080px; height: 1350px; background: var(--bg); color: var(--fg); }

  /* IMAGE AREA — top 1080×819 */
  .img-area { position: absolute; top: 0; left: 0; right: 0; height: 819px; overflow: hidden; }
  .img-area img {
    width: 100%; height: 100%; object-fit: cover;
    filter: saturate(0.7) brightness(0.85) contrast(1.05);
  }
  .img-tint {
    position: absolute; inset: 0; z-index: 4;
    background: linear-gradient(180deg, rgba(11,120,248,0.06) 0%, rgba(11,120,248,0.02) 100%);
    mix-blend-mode: overlay; pointer-events: none;
  }
  .img-fade {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 5;
    height: 60%;
    background: linear-gradient(180deg,
      rgba(13,13,13,0) 0%,
      rgba(13,13,13,0.20) 30%,
      rgba(13,13,13,0.65) 70%,
      rgba(13,13,13,0.95) 100%);
    pointer-events: none;
  }
  .attribution {
    position: absolute; top: 24px; right: 28px; z-index: 6;
    color: rgba(255,255,255,0.55);
    font-size: 18px; font-weight: 500; letter-spacing: -0.2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  /* TEXT AREA — bottom 1080×531 */
  .text-area {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 531px;
    padding: 70px 88px 110px;
  }
  .headline {
    font-size: 56px; font-weight: 800; line-height: 1.3;
    letter-spacing: -1px; color: #fff;
    word-break: keep-all;
  }
  .body {
    margin-top: 28px;
    font-size: 32px; font-weight: 400; line-height: 1.55;
    letter-spacing: -0.3px;
    color: var(--body);
    word-break: keep-all;
    white-space: pre-line;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="img-area">
      <img src="{{IMG}}" alt="" />
      <div class="img-tint"></div>
      <div class="img-fade"></div>
      <div class="attribution">Photo · {{PHOTOG}} / Unsplash</div>
    </div>
    <div class="text-area">
      <div class="headline">{{HEADLINE}}</div>
      <div class="body">{{BODY}}</div>
    </div>
  </div>
</body>
</html>
