<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1080, initial-scale=1" />
    <title>{{topic}} — {{type}}</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <style>
      {{baseCss}}
    </style>
    <style>
      {{themeCss}}
    </style>
    <style>
      {{typesCss}}
    </style>
    <style>
      :root { --hl-brush: {{brushUrl}}; }
    </style>
  </head>
  <body class="theme-{{theme}}">
    <div class="card card--{{type}}" data-type="{{type}}" data-theme="{{theme}}">
      {{cardBody}}
    </div>
  </body>
</html>
