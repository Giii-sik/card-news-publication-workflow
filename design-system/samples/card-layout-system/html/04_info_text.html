<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1080, initial-scale=1" />
    <link rel="stylesheet" href="./layout-system.css" />
    <title>Layout Sample 04 Info Text</title>
  </head>
  <body>
    <article class="card card--dark card--info-text">
      <div class="info-text-only-area">
        <span class="emoji-icon" aria-hidden="true">⏰</span>
        <h2 class="headline">인포 텍스트 카드입니다.
<span class="draw-underline">핵심문장</span>을 크게 보여줍니다</h2>
        <p class="body">본문 더미 텍스트를 입력합니다. 이미지 없이도 한 가지 내용을 충분히 설명할 때 사용합니다. 문장은 짧게 유지합니다.</p>
      </div>
    </article>
  </body>
